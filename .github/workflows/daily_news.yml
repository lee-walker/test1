name: Daily News Summary

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早上 8:00 (UTC 0:00)
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: pip install feedparser

      - name: Fetch Raw News
        run: python fetch_news.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Generate News Summary with Gemini
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT="请分析以下每日新闻 JSON 数据，以中文形式概要总结每日新闻。
          重点关注：人工智能（AI）、网络安全（Cybersecurity）、国际局势、股市、热门科技动态。
          
          输出要求：
          请直接输出一个 JSON 列表，列表中的每个对象包含以下字段：
          - category: 新闻类别（如：AI 领域、网络安全、国际新闻、股市动态、热门科技）
          - title: 新闻标题
          - link: 原文链接
          - summary: 简短摘要（不超过30字）
          
          精选 15 条最重要的新闻。不要输出任何除了 JSON 以外的文字。不要包含 markdown 的 \`\`\`json 块，直接输出内容。
          
          数据如下：
          $(cat news_data.json)"
          
          # 使用 gemini-3-flash-preview 模型，增加重试逻辑
          for i in {1..3}; do
            gemini --model gemini-3-flash-preview "$PROMPT" > summary.json && break || {
              echo "Gemini API call failed, retrying in 30s... ($i/3)"
              sleep 30
            }
          done

          if [ ! -s summary.json ]; then
            echo "Failed to generate summary after 3 retries."
            exit 1
          fi
          
          # Format the JSON summary into the desired Markdown format
          python format_summary.py summary.json > summary.txt
          
          SUMMARY=$(cat summary.txt)
          echo "SUMMARY<<EOF" >> $GITHUB_ENV
          echo "$SUMMARY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Push to Bark
        env:
          BARK_URL: ${{ secrets.BARK_URL }}
        run: |
          SUMMARY=$(cat summary.txt)
          # 使用 jq 构造完整的 JSON 负载，并确保 Markdown 中的换行符被正确转义
          PAYLOAD=$(jq -n \
            --arg title "今日新闻摘要" \
            --arg body "$SUMMARY" \
            --arg group "News" \
            --arg url "https://news.google.com/" \
            '{title: $title, body: $body, group: $group, url: $url}')
          
          curl -X POST "${BARK_URL}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD"

