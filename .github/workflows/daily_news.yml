name: Daily News Summary

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早上 8:00 (UTC 0:00)
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: pip install feedparser

      - name: Fetch Raw News
        run: python fetch_news.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Generate News Summary with Gemini
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT="请分析以下每日新闻 JSON 数据，以中文形式概要总结每日新闻。
          重点关注：人工智能（AI）、网络安全（Cybersecurity）、国际局势、股市、热门科技动态。
          
          格式要求：
          1. 精选 15 条最重要的新闻。
          2. 每条新闻格式：[新闻标题](原文链接) - 简短摘要（不超过30字）。
          3. 分类列出（例如：[AI 领域]、[网络安全]、[国际新闻]）。
          4. 不要直接显示网址明文，标题必须嵌入链接。
          5. 全文保持简洁，适合在手机 Bark App 上一屏预览。
          
          数据如下：
          $(cat news_data.json)"
          
          # 使用 gemini-3-flash-preview 模型，增加重试逻辑
          for i in {1..3}; do
            gemini --model gemini-3-flash-preview "$PROMPT" > summary.txt && break || {
              echo "Gemini API call failed, retrying in 30s... ($i/3)"
              sleep 30
            }
          done

          if [ ! -s summary.txt ]; then
            echo "Failed to generate summary after 3 retries."
            exit 1
          fi
          
          SUMMARY=$(cat summary.txt)
          echo "SUMMARY<<EOF" >> $GITHUB_ENV
          echo "$SUMMARY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Push to Bark
        env:
          BARK_URL: ${{ secrets.BARK_URL }}
          SUMMARY: ${{ env.SUMMARY }}
        run: |
          curl -X POST "${BARK_URL}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d @- <<EOF
          {
            "title": "今日新闻摘要",
            "body": $(echo "$SUMMARY" | jq -Rs .),
            "group": "News",
            "url": "https://news.google.com/"
          }
          EOF

